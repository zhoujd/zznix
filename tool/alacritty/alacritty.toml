[bell]
animation = "EaseOutExpo"
duration = 0

[colors.bright]
black = "0x555555"
blue = "0xbd93f9"
cyan = "0x8be9fd"
green = "0x50fa7b"
magenta = "0xff79c6"
red = "0xff5555"
white = "0xffffff"
yellow = "0xf1fa8c"

[colors.normal]
black = "0x000000"
blue = "0xbd93f9"
cyan = "0x8be9fd"
green = "0x50fa7b"
magenta = "0xff79c6"
red = "0xff5555"
white = "0xbbbbbb"
yellow = "0xf1fa8c"

[colors.primary]
background = "0x000000"
foreground = "0xf8f8f2"

[cursor]
style = "Block"

[font]
size = 11.0

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[[keyboard.bindings]]
action = "SpawnNewInstance"
key = "Return"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "SpawnNewInstance"
key = "N"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "ToggleViMode"
key = "Space"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "ToggleViMode"
key = "Q"
mods = "Control|Shift"

[terminal]

[[mouse.bindings]]
action = "PasteSelection"
mouse = "Right"

[scrolling]
history = 8192
multiplier = 3

[selection]
save_to_clipboard = true

[terminal.shell]
args = ["--login", "-i"]
program = "c:/Git/bin/bash"

[window]
decorations = "Full"
dynamic_title = true
opacity = 0.95

[window.dimensions]
columns = 110
lines = 32

[window.padding]
x = 2
y = 2

[keyboard]
