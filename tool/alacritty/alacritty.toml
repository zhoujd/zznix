# Alacritty Configuration Example (TOML Format)

# Live config reload (updates instantly when you save this file)
[general]
live_config_reload = true

[window]
decorations = "Full"
dynamic_title = true
opacity = 0.95

[window.dimensions]
columns = 110
lines = 32

[window.padding]
x = 2
y = 2

[colors.primary]
background = "#000000"
foreground = "#cdd6f4"

[colors.cursor]
text = "#11111b"
cursor = "#f5e0dc"

[colors.normal]
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#bac2de"

[colors.bright]
black = "#585b70"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#a6adc8"

[cursor]
style = "Block"

[bell]
duration = 0

[font]
size = 11.0

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true

[terminal.shell]
args = ["--login", "-i"]
program = "c:/Git/bin/bash"

[[mouse.bindings]]
action = "PasteSelection"
mouse = "Right"

[[keyboard.bindings]]
action = "SpawnNewInstance"
key = "Return"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "SpawnNewInstance"
key = "N"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "ToggleViMode"
key = "Space"
mods = "Control|Shift"

[[keyboard.bindings]]
action = "ToggleViMode"
key = "Q"
mods = "Control|Shift"
