# Save this file to: ~/.config/alacritty/alacritty.yml
# ==============================================================================

# 1. WINDOW ENVIRONMENT & SETTINGS
window:
  dimensions:
    columns: 110
    lines: 32

  padding:
    x: 2
    y: 2

  # Options: Full, None, Transparent (macOS), Buttonless (macOS)
  decorations: Full
  
  # Background transparency (0.0 is completely clear, 1.0 is opaque)
  opacity: 0.95
  
  # Keep title synced with the current active process
  dynamic_title: true

# 2. SCROLLBACK HISTORY
scrolling:
  history: 8192
  multiplier: 3

# 3. TYPOGRAPHY & FONTS
font:
  size: 11.0

  normal:
    family: "JetBrains Mono" # Replace with "Fira Code" or "Hack" if preferred
    style: Regular

  bold:
    family: "JetBrains Mono"
    style: Bold

  italic:
    family: "JetBrains Mono"
    style: Italic

# 4. CURSOR CUSTOMIZATION
cursor:
  # Options: Block, Underline, Beam
  style: Block
  
  # If true, the cursor blinks
  blink: true

# 5. DRACULA COLOR SCHEME EXAMPLE
colors:
  primary:
    background: '0x000000'
    foreground: '0xf8f8f2'

  normal:
    black:   '0x000000'
    red:     '0xff5555'
    green:   '0x50fa7b'
    yellow:  '0xf1fa8c'
    blue:    '0xbd93f9'
    magenta: '0xff79c6'
    cyan:    '0x8be9fd'
    white:   '0xbbbbbb'

  bright:
    black:   '0x555555'
    red:     '0xff5555'
    green:   '0x50fa7b'
    yellow:  '0xf1fa8c'
    blue:    '0xbd93f9'
    magenta: '0xff79c6'
    cyan:    '0x8be9fd'
    white:   '0xffffff'

# 6. MOUSE BEHAVIOR
mouse:
  # Instantly copy selected text into your system clipboard
  copy_on_selection: true
  
selection:
  save_to_clipboard: true

mouse_bindings:
  # Right click to paste from clipboard
  - { mouse: Right, action: PasteSelection  }

# 7. BELL CONFIGURATION
bell:
  animation: EaseOutExpo
  duration: 0

# 8. TERMINAL
shell:
  program: c:/Git/bin/bash
  args:
    - --login
    - -i

# 9. KEY
key_bindings:
  - { key: Return, mods: Control|Shift, action: SpawnNewInstance }
  - { key: N,      mods: Control|Shift, action: SpawnNewInstance }
  - { key: Space,  mods: Control|Shift, action: ToggleViMode }
  - { key: Q,      mods: Control|Shift, action: ToggleViMode }
