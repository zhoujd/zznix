# Alacritty Configuration Example (TOML Format)

# Live config reload (updates instantly when you save this file)
[general]
live_config_reload = true

[window]
decorations = "Full"
dynamic_title = true
opacity = 0.95

[window.dimensions]
columns = 110
lines = 32

[window.padding]
x = 2
y = 2

[colors.primary]
background = "#000000"
foreground = "#cdd6f4"

[colors.cursor]
text = "#11111b"
cursor = "#f5e0dc"

[colors.normal]
black = "#45475a"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#bac2de"

[colors.bright]
black = "#585b70"
red = "#f38ba8"
green = "#a6e3a1"
yellow = "#f9e2af"
blue = "#89b4fa"
magenta = "#f5c2e7"
cyan = "#94e2d5"
white = "#a6adc8"

[cursor]
style = "Block"

[bell]
duration = 0

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true

[font]
size = 11.0

[font.normal]
family = "JetBrains Mono"
style = "Regular"

[font.bold]
family = "JetBrains Mono"
style = "Bold"

[font.italic]
family = "JetBrains Mono"
style = "Italic"

[terminal.shell]
args = ["--login", "-i"]
program = "C:/Git/bin/bash"

[mouse]
bindings = [
  { mouse = "Right", action = "PasteSelection"},
]

[keyboard]
bindings = [
  # Remap on Windows
  { key = "Space",  mods = "Control", chars = "\u0000"  },
  { key = "Slash",  mods = "Control", chars = "\u001f"  },
  { key = "Key1",   mods = "Alt",     chars = "\u001b1" },
  { key = "Key2",   mods = "Alt",     chars = "\u001b2" },
  { key = "Key3",   mods = "Alt",     chars = "\u001b3" },
  { key = "Key4",   mods = "Alt",     chars = "\u001b4" },
  { key = "Key5",   mods = "Alt",     chars = "\u001b5" },
  { key = "Key6",   mods = "Alt",     chars = "\u001b6" },
  { key = "Key7",   mods = "Alt",     chars = "\u001b7" },
  { key = "Key8",   mods = "Alt",     chars = "\u001b8" },
  { key = "Key9",   mods = "Alt",     chars = "\u001b9" },
  { key = "Minus",  mods = "Alt",     chars = "\u001b-" },
  # Shotkeys
  { key = "Return", mods = "Control|Shift", action = "SpawnNewInstance" },
  { key = "N",      mods = "Control|Shift", action = "SpawnNewInstance" },
  { key = "Space",  mods = "Control|Shift", action = "ToggleViMode" },
  { key = "Q",      mods = "Control|Shift", action = "ToggleViMode" },
]
