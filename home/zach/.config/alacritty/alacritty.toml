# Alacritty Configuration Example (TOML Format)

# Live config reload (updates instantly when you save this file)
[general]
live_config_reload = true

[env]
TERM = "xterm-256color"

[window]
dimensions = { columns = 110, lines = 30 }
padding = { x = 4, y = 0 }
opacity = 0.95
blur = true
resize_increments = true

[colors.primary]
background = "#000000"
foreground = "#ebdbb2"

[colors.cursor]
text = "#ebdbb2"
cursor = "#cccccc"

[colors.normal]
black = "#282828"
red = "#cc241d"
green = "#98971a"
yellow = "#d79921"
blue = "#458588"
magenta = "#b16286"
cyan = "#689d6a"
white = "#a89984"

[colors.bright]
black = "#928374"
red = "#fb4934"
green = "#b8bb26"
yellow = "#fabd2f"
blue = "#83a598"
magenta = "#d3869b"
cyan = "#8ec07c"
white = "#ebdbb2"

[cursor]
style = "Block"

[bell]
duration = 0

[scrolling]
history = 5000
multiplier = 3

[selection]
save_to_clipboard = true

[font]
size = 11.0
normal = { family = "JetBrains Mono", style = "Regular" }
bold = { family = "JetBrains Mono", style = "Bold" }
italic = { family = "JetBrains Mono", style = "Italic" }
bold_italic = { family = "JetBrains Mono", style = "Bold Italic" }

[terminal]
shell = { program = "C:/Git/bin/bash", args = ["--login", "-i"] }

[mouse]
bindings = [
  { mouse = "Right", action = "PasteSelection"},
]

[keyboard]
bindings = [
  # Remap on Windows
  { key = "Space",  mods = "Control", chars = "\u0000" },
  { key = "Slash",  mods = "Control", chars = "\u001f" },
  { key = "Key1",   mods = "Alt",     chars = "\u001b1" },
  { key = "Key2",   mods = "Alt",     chars = "\u001b2" },
  { key = "Key3",   mods = "Alt",     chars = "\u001b3" },
  { key = "Key4",   mods = "Alt",     chars = "\u001b4" },
  { key = "Key5",   mods = "Alt",     chars = "\u001b5" },
  { key = "Key6",   mods = "Alt",     chars = "\u001b6" },
  { key = "Key7",   mods = "Alt",     chars = "\u001b7" },
  { key = "Key8",   mods = "Alt",     chars = "\u001b8" },
  { key = "Key9",   mods = "Alt",     chars = "\u001b9" },
  { key = "Minus",  mods = "Alt",     chars = "\u001b-" },
  # Shotkeys
  { key = "Return", mods = "Control|Shift", action = "SpawnNewInstance" },
  { key = "N",      mods = "Control|Shift", action = "SpawnNewInstance" },
  { key = "Space",  mods = "Control|Shift", action = "ToggleViMode" },
  { key = "Q",      mods = "Control|Shift", action = "ToggleViMode" },
]
